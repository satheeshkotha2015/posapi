apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqlserver
  template:
    metadata:
      labels:
        app: sqlserver
    spec:
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: SA_PASSWORD
              value: "StrongPass@123"
          ports:
            - containerPort: 1433

---
apiVersion: v1
kind: Service
metadata:
  name: sqlserver
spec:
  selector:
    app: sqlserver
  ports:
    - port: 1433
      targetPort: 1433

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pos-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pos-api
  template:
    metadata:
      labels:
        app: pos-api
    spec:
      containers:
        - name: pos-api
          image: airuniam/pos-api:latest
          imagePullPolicy: Always
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Server=sqlserver,1433;Database=PosDb;User Id=sa;Password=StrongPass@123;TrustServerCertificate=True;"
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: pos-api
spec:
  type: NodePort
  selector:
    app: pos-api
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007
